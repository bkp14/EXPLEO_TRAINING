#configuration name
name = Properties.config

#log file output folder
Property.filename = logs

#Define appenders
appenders = Console.file

#console Appender
appender.Console.type = Console
appender.Console.name = STDOUT
appender.Console.layout.type = PatternLayout
appender.Console.layout.pattern = [%-5level]%d{yyyy-MM-dd-HH:mm:ss:SSSS}{%t} %c{ly-%msg%}

#file appender
appender.file.type=File
appender.file.name=LogFile
appender.file.filename=$(filename)/logs.log
appender.file.layout.type=PatternLayout
appender.file.layout.path=[%-5level]%d{yyyy-MM-dd-HH:mm:ss:SSSS}{%t} %c{ly-%msg%}

#Rootlogger configuration 
rootLogger.level=debug
rootLogger.appenderRef=stdout.file
rootLogger.appenderRef.stdout.ref=debug
rootLogger.level=debug




